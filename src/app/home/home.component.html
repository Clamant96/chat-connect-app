<section class="container-section">
  <nav class="menu-responsivo" >
    <ul>
      <div class="perfil">
        <img src="{{avatar}}" alt="{{username}}">
        <p class="username">
          {{username}}
        </p>
      </div>
      <div class="nova-categoria">
        <input type="text" name="categoria" id="categoria" placeholder="Nova categoria" />
        <button type="submit" >Adicionar</button>
      </div>
      <hr />
      <a routerLink="/home" *ngFor='let item of chatArray' >
        <img src="{{item.img}}" alt="{{item.nome}}" (click)='findByIdChat(item)'>
        <p class="texto" (click)='findByIdChat(item)' >{{item.nome}}</p>
      </a>
    </ul>
  </nav>
  <div class="lista-categoria">
    <h1>
      {{nomeChat}}
    </h1>
    <ul>
      <a *ngFor='let item of chat.conversas' >
        <div class="{{ajustaMensagem(item.usuario.id, id)}}">
          <div class="icone">
            <img src="{{item.usuario.img}}" alt="{{item.usuario.username}}">
          </div>
          <div class="mesagem">
            <p class="nome-usuario">
              {{item.usuario.username}}
            </p>
            <p class="conteudo-conversa">
              {{item.conteudo}}
            </p>
          </div>
        </div>
      </a>
      <div class="novo-item-lista" >
        <input [(ngModel)]='conversa.conteudo' type="text" name="lista" id="lista" placeholder="Novo item" />
        <button type="submit" (click)='adicionarItemLista()' >Adicionar item</button>
      </div>
    </ul>
  </div>
</section>
